<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'application1/css/style.css' %}?v=4">
    <title>{% block title %}AutoMarket{% endblock %}</title>
</head>
<body>

    <header>
        <div>
            <b>AutoMarket</b>
            <nav>
                <a href="{% url 'accueil' %}">Accueil</a>
                <a href="{% url 'catalogue' %}">Catalogue</a>
                <a href="{% url 'about' %}">À propos</a>
                <a href="{% url 'contact' %}">Contact</a>
                <a href="{% url 'commander' %}">Réserver</a>
                <a href="{% url 'memory_game' %}">Jeu</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'application1/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
